schema: spec-driven

context: |
  CAPJ App Pagos — plataforma institucional de gestión, workflow, trazabilidad,
  expediente documental y reportabilidad. Complementa sistemas oficiales (SGF, CGU,
  BancoEstado, SII, CMF, Mercado Público); no los reemplaza ni copia su lógica interna.

  Jerarquía institucional fija: instituciones -> jurisdicciones -> cfinancieros -> ccostos.
  Gobierna permisos, filtros, reportes y trazabilidad. Las tablas maestras usan id interno
  como PK y código institucional como unique.

  Reglas no negociables (detalle completo en HARNESS_IA.md, secciones 4-14):
  - SGF es origen, no gobierno: sgf_id/sgf_status/payloads crudos son evidencia. El
    workflow, estados, responsables y unidades internas los gobierna el sistema propio;
    nunca se mezclan con los estados/grupos de SGF.
  - Snapshot obligatorio: todo dato/documento recibido desde SGF o cualquier API externa
    relevante guarda payload original, fuente, fecha, hash, método de captura y
    usuario/job responsable, vinculado al caso.
  - Workflow antes que CRUD: todo cambio de estado pasa exclusivamente por
    TransicionWorkflowService::execute(). Prohibido cambiar estados desde controladores,
    jobs, seeders o componentes React.
  - Un sgf_id = un caso_pago_proveedor = un proceso workflow individual. No crear
    payment_submissions ni lotes de envío.
  - Expediente documental variable: los requisitos documentales los entrega el backend
    según módulo/proceso/modalidad/monto/estado. React solo renderiza el checklist
    recibido, nunca lo hardcodea.
  - API primero: toda integración externa pasa por sistemas_externos, solicitudes_api_externas,
    snapshots_datos_externos, trabajos_integracion. Playwright solo como respaldo autorizado
    cuando no hay API suficiente, nunca para evadir MFA/CAPTCHA/controles de acceso ni
    para guardar credenciales/cookies en Git.
  - Informes razonados nacen de cortes y snapshots, nunca de datos vivos cambiantes;
    siempre terminan con revisión humana antes de publicarse.
  - Core no desactivable: auth, roles, estructura CAPJ, workflow, auditoría, documentos,
    indicadores, integraciones y reportabilidad. Módulos funcionales activables (Pago de
    Proveedores, Adquisiciones, Presupuesto, Mantenimiento, RR.HH., Consumo eléctrico,
    Servicios contratados, Informes razonados) pueden desactivarse sin borrar datos.
    Implementados hoy: Pago de Proveedores, Adquisiciones, Informes razonados. Los demás
    son plan, no código — no asumir tablas/modelos existentes para ellos.
  - Permisos: convención modulo_accion.verbo en snake_case en ambos lados (ej.
    pago_proveedores.registrar_cgu, usuarios.resetear_password), consistente en todos los
    seeders reales. Usar siempre este formato al definir permisos nuevos.

  Stack obligatorio: Laravel 13 (PHP ^8.4), PostgreSQL, Inertia 3 + React 19, Spatie
  Laravel Permission, Sanctum si corresponde, Queue/Scheduler/Process, Laravel Boost.
  Controladores livianos; Form Requests para validación; Services para lógica de
  negocio; Policies/Gates/Middleware para autorización; Jobs para procesos pesados;
  Events/Listeners para efectos secundarios; Resources/Collections hacia React;
  transacciones en operaciones críticas. Prohibido lógica pesada en controladores o
  queries complejas en React.

  Detenerse y pedir confirmación humana si una instrucción: usa SGF como workflow
  interno, borra trazabilidad/snapshots/auditoría, automatiza pagos/cierres/informes
  sin aprobación humana, saltea TransicionWorkflowService, o usa Playwright para evadir
  controles de acceso.

  Orden de implementación: tasks/01_*.md a tasks/10_*.md, en ese orden numérico; cada
  uno corresponde 1:1 a un dominio en openspec/specs/. Los 10 ya están implementados y
  archivados; funcionalidad nueva (core o de módulos) se propone ad-hoc vía
  /opsx:propose, sin numeración fija — su fuente de verdad es openspec/specs/, no una
  lista mantenida a mano.

  Rendimiento — lecciones de una auditoría previa (ver openspec/changes/archive/2026-07-04-*
  para el detalle completo), a tener en cuenta en toda propuesta nueva:
  - Cualquier prop compartida en cada request (HandleInertiaRequests::share(), o
    equivalente) que dependa de datos que cambian con poca frecuencia SHALL cachearse
    con TTL corto + invalidación en el punto de escritura, no recalcularse en cada
    request. Si el mismo dato también lo pide un controlador específico (ej. el
    dashboard), ambos SHALL resolverlo contra el mismo servicio cacheado en vez de
    duplicar la consulta cada uno por su lado (ver IndicadorEconomicoSelector::
    ultimosPorTipo como referencia).
  - El código generado por Wayfinder (resources/js/routes/**, resources/js/actions/**)
    NO es tree-shakeable a nivel de archivo: cada método del controlador se ata al
    export por defecto mediante asignaciones a nivel de módulo. Si CUALQUIER
    consumidor en la app importa el export por defecto de un archivo de rutas/acciones,
    Rollup conserva el archivo completo para todos los demás consumidores también.
    Preferir siempre import con nombre (`import { index as x } from '@/routes/...'`)
    por consistencia con el resto del código, pero no esperar que por sí solo reduzca
    el tamaño del bundle mientras exista al menos un consumidor que use el export por
    defecto del mismo archivo — verificar con `npm run build` antes de prometer una
    reducción de tamaño.
  - Antes de agregar un índice de base de datos por sospecha de N+1 o "falta de
    índice", verificar el SQL real generado (`Model::query()->toSql()` o `EXPLAIN`) —
    un `whereHas`/`whereNull` puede ya estar cubierto por un índice compuesto existente
    en la correlación (ej. las relaciones polimórficas `sujeto_type`/`sujeto_id` de
    `procesos`). No proponer migraciones de índices sin ese chequeo previo.
  - `CACHE_STORE` y `SESSION_DRIVER` están en `database` (no hay redis/predis instalado
    en este entorno). Cambiarlos es una decisión de infraestructura vía `.env` (no
    versionado, no pasa por OpenSpec ni por git) — no proponerlo como un change de
    código; si se evalúa, es una conversación aparte con quien opera el entorno.
  - Antes de proponer un fix de performance, medir el estado actual (build de
    producción, `toSql()`/query log, conteo de filas reales) y volver a medir después
    del cambio — no asumir el efecto de una optimización sin verificarlo empíricamente.

  Jobs de larga duración y conectores Playwright — lecciones de la calibración real
  del conector SGF (ver services/sgf-playwright/CALIBRACION.md y HARNESS_IA.md
  sección 13 para el detalle completo), a tener en cuenta en toda propuesta nueva:
  - `php artisan queue:listen` ejecuta cada job en un proceso hijo envuelto en un
    `Symfony\Component\Process\Process` con su PROPIO timeout de 60s por defecto,
    independiente del `$timeout` del Job (que solo aplica al límite interno vía
    pcntl_alarm, no disponible en Windows). Si un Job puede tardar más de 60s, hay
    que pasar `--timeout` explícito a `queue:listen` (ver composer.json, script
    "dev") acorde a la duración esperada — si no, el Symfony Process mata el
    proceso hijo Y crashea `queue:listen` completo sin dejar ningún registro de
    error, dejando el `trabajo_integracion` huérfano en `en_progreso`.
  - Todo Job con middleware `WithoutOverlapping` SHALL fijar `expireAfter()`
    explícito. Sin él, el lock queda tomado ~24h por defecto; si el proceso muere
    de forma abrupta sin liberarlo, cada reintento choca contra el lock viejo y
    falla instantáneamente por "demasiados intentos" sin ejecutar nada.
  - Un `trabajo_integracion` "en_progreso" puede quedar huérfano por causas fuera
    del código (timeout de proceso, terminal cerrada, equipo suspendido, servicio
    externo reiniciado a mitad de camino) — la capa transversal ya detecta y marca
    esto automáticamente (ver requirement "Detectar y marcar automáticamente
    trabajos de integración huérfanos" en `integraciones-api-browser-automation`);
    no reinventar esta lógica en un conector nuevo, reutilizar
    `IntegracionExternaService::expirarSiEsHuerfano()`.
  - Todo conector Playwright SHALL cerrar la sesión de navegador autenticada al
    terminar cada ejecución (éxito o error) — no reutilizar el navegador entre
    corridas (ver requirement "No mantener viva una sesión de automatización
    entre ejecuciones" en `integraciones-api-browser-automation`).
